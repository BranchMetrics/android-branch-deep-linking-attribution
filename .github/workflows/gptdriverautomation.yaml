name: GPTDriver Test Suite Automation 

on:
  push:
    branches:
      - 'Release-*'
  workflow_dispatch:

jobs:
  BuildAndTestAppOnGPTDriver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build TestBed APK
        run: ./gradlew :Branch-SDK-TestBed:assembleDebug

      - name: Run GPTDriver tests
        run: |
          chmod +x .github/gptdriverrunscript.sh
          bash .github/gptdriverrunscript.sh Branch-SDK-TestBed/build/outputs/apk/debug/Branch-SDK-TestBed-debug.apk android
        env:
          API_ORG_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
          API_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
          TEST_TAGS: Release
