name: MobileBoost UI Test Suite

on:
  push:
    branches:
      - 'Release-*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from branch name
        id: extract_version
        run: |
          BRANCH_NAME="${{ github.ref }}"
          BRANCH_NAME="${BRANCH_NAME#refs/heads/}"
          VERSION=$(echo "$BRANCH_NAME" | sed -n 's/^Release-\([0-9]*\.[0-9]*\.[0-9]*\)$/\1/p')

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from branch name '$BRANCH_NAME'. Expected format: Release-X.Y.Z"
            exit 1
          fi

          echo "Extracted version: $VERSION"
          echo "VERSION_STRING=$VERSION" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build TestBed APK
        run: ./gradlew :Branch-SDK-TestBed:assembleDebug

      - name: Upload TestBed APK
        uses: actions/upload-artifact@v4
        with:
          name: Branch-SDK-TestBed-${{ env.VERSION_STRING }}
          path: Branch-SDK-TestBed/build/outputs/apk/debug/Branch-SDK-TestBed-debug.apk

      - name: Run MobileBoost tests
        run: |
          chmod +x .github/gptdriverrunscript.sh
          bash .github/gptdriverrunscript.sh \
            Branch-SDK-TestBed/build/outputs/apk/debug/Branch-SDK-TestBed-debug.apk \
            android
        env:
          API_ORG_KEY: ${{ secrets.MOBILEBOOST_API_ORG_KEY }}
          API_KEY: ${{ secrets.MOBILEBOOST_API_ORG_KEY }}
          TEST_TAGS: Release
