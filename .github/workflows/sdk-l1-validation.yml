name: Layer 1 - SDK Wire Validation (PR Gate)

on:
  pull_request:
    branches: [master, main, feature/mobileboost-e2e-tests]
  workflow_dispatch:

jobs:
  validate-wire-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # Build both APKs up-front so the emulator step only deals with install/run/pull.
      # We deliberately bypass `connectedDebugAndroidTest` because, for `com.android.test`
      # modules using `ANDROIDX_TEST_ORCHESTRATOR` + `clearPackageData=true`, AGP's task
      # runner uninstalls the target package once the run finishes. The post-test
      # `adb shell run-as io.branch.branchandroidtestbed cat ...` then fails with
      # `unknown package` and `branchlogs.txt` is never produced for L1 validation.
      - name: Build TestBed + GPTDriver APKs
        env:
          # Gradle maps ORG_GRADLE_PROJECT_<name> env vars to project properties,
          # so the GPTDriver module's `findProperty("MOBILEBOOST_API_KEY")` picks
          # this up without ever placing the secret on the command line (where
          # it would appear in `ps`, kernel audit logs, and CI run UIs).
          ORG_GRADLE_PROJECT_MOBILEBOOST_API_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
        run: |
          ./gradlew \
            :Branch-SDK-TestBed:assembleDebug \
            :Branch-SDK-GPTDriver:assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx8192M -Dkotlin.daemon.jvm.options\\=\"-Xmx8192M\""

      - name: Run Instrumented Tests (Generate Activity) and Pull Logs
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MOBILEBOOST_API_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          # MOBILEBOOST_API_KEY is propagated to the script via the step `env:`
          # block above; the script reads it from the environment, so we no
          # longer pass the secret as a positional argument (avoids argv leak).
          script: ./scripts/run_l1_instrumented.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run L1 Validation Script
        run: python scripts/validate_l1_logs.py branchlogs.txt

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: branch-wire-logs
          path: branchlogs.txt
