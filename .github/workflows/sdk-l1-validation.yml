name: Layer 1 - SDK Wire Validation (PR Gate)

on:
  pull_request:
    branches: [master, main, feature/mobileboost-e2e-tests]
  workflow_dispatch:

jobs:
  validate-wire-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # Build both APKs up-front so the emulator step only deals with install/run/pull.
      # We deliberately bypass `connectedDebugAndroidTest` because, for `com.android.test`
      # modules using `ANDROIDX_TEST_ORCHESTRATOR` + `clearPackageData=true`, AGP's task
      # runner uninstalls the target package once the run finishes. The post-test
      # `adb shell run-as io.branch.branchandroidtestbed cat ...` then fails with
      # `unknown package` and `branchlogs.txt` is never produced for L1 validation.
      - name: Build TestBed + GPTDriver APKs
        run: |
          ./gradlew \
            :Branch-SDK-TestBed:assembleDebug \
            :Branch-SDK-GPTDriver:assembleDebug \
            -PMOBILEBOOST_API_KEY=${{ secrets.MOBILEBOOST_API_KEY }} \
            -Dorg.gradle.jvmargs="-Xmx8192M -Dkotlin.daemon.jvm.options\\=\"-Xmx8192M\""

      - name: Run Instrumented Tests (Generate Activity) and Pull Logs
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MOBILEBOOST_API_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -euo pipefail

            TARGET_APK="Branch-SDK-TestBed/build/outputs/apk/debug/Branch-SDK-TestBed-debug.apk"
            TEST_APK="Branch-SDK-GPTDriver/build/outputs/apk/debug/Branch-SDK-GPTDriver-debug.apk"
            TARGET_PKG="io.branch.branchandroidtestbed"
            TEST_PKG="io.branch.gptdriver"
            RUNNER="androidx.test.runner.AndroidJUnitRunner"
            TEST_CLASS="io.branch.gptdriver.tests.LinkCreationDeterministicTest"

            adb wait-for-device
            adb shell input keyevent 82 || true

            echo "Installing target APK: $TARGET_APK"
            adb install -r -t "$TARGET_APK"
            echo "Installing test APK: $TEST_APK"
            adb install -r -t "$TEST_APK"

            # Run via am instrument directly (no orchestrator) so the target package
            # remains installed after the run, allowing run-as to read its private files.
            # -w = wait for completion and stream results to stdout
            # -r = raw output (parseable) so we can grep the final status
            INSTRUMENT_LOG=instrument.log
            adb shell am instrument -w -r \
              -e class "$TEST_CLASS" \
              -e MOBILEBOOST_API_KEY "$MOBILEBOOST_API_KEY" \
              "$TEST_PKG/$RUNNER" | tee "$INSTRUMENT_LOG"

            # `am instrument` exits 0 even when tests fail; inspect the output instead.
            if grep -qE "^INSTRUMENTATION_CODE: -1$" "$INSTRUMENT_LOG" && \
               ! grep -qE "^INSTRUMENTATION_STATUS: stack=" "$INSTRUMENT_LOG"; then
              echo "Instrumentation reported success."
            else
              echo "Instrumentation reported failures or did not complete cleanly."
              cat "$INSTRUMENT_LOG"
              exit 1
            fi

            # Pull logs while the target package is still installed.
            adb shell "run-as $TARGET_PKG cat /data/user/0/$TARGET_PKG/files/branchlogs.txt" > branchlogs.txt
            wc -l branchlogs.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run L1 Validation Script
        run: python scripts/validate_l1_logs.py branchlogs.txt

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: branch-wire-logs
          path: branchlogs.txt
