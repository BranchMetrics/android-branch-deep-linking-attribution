name: unit-and-instrumented-tests
on:
  workflow_dispatch:
  push:
env:
  API_MIN: 21
  API_CURRENT: 34
  JAVA_DISTRIBUTION: "corretto"
  JAVA_VERSION: "17"
jobs:
  unit-test-api-level-min:
    name: unit-test-api-level-$API_MIN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # repo's gradle is configured to run on java 17
      - name: Setup java 17 for gradle
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run unit tests
        run: |
          ./gradlew :Branch-SDK:testDebugUnitTest
      # contains the reports and apk
      - name: Save test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-api-level-$API_MIN
          path: ./Branch-SDK/build/

  instrumented-test-api-level-min:
    name: instrumented-test-api-level-$API_MIN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # repo's gradle is configured to run on java 17
      - name: Setup java 17 for gradle
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      # Boots an emulator on KVM-accelerated Ubuntu and runs instrumented tests
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 21
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: |
            ./gradlew :Branch-SDK:connectedDebugAndroidTest -Dorg.gradle.jvmargs="-Xmx8192M -Dkotlin.daemon.jvm.options\\=\"-Xmx8192M\"" --info
      # contains the reports and apk
      - name: Save test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-api-level-$API_MIN
          path: ./Branch-SDK/build/

  jacoco-test-coverage-api-level-min:
    name: jacoco-test-coverage-api-level-$API_MIN
    if: ${{ always() && contains(join(needs.*.result, ','), 'success') }}
    needs: [unit-test-api-level-min, instrumented-test-api-level-min]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # repo's gradle is configured to run on java 17
      - name: Setup java 17 for gradle
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run Coverage
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 21
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: |
            ./gradlew :Branch-SDK:jacocoTestReport --info
      - name: Upload Coverage Test Report
        if: success()
        uses: codecov/codecov-action@v5
        with:
          file: ./Branch-SDK/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          # Don't fail the CI run on transient Codecov upstream errors — coverage
          # reporting is observability, not a correctness gate. The action still
          # surfaces errors in its own step log.
          fail_ci_if_error: false

  unit-test-api-level-current:
    name: unit-test-api-level-$API_CURRENT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # repo's gradle is configured to run on java 17
      - name: Setup java 17 for gradle
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run unit tests
        run: |
          ./gradlew :Branch-SDK:testDebugUnitTest
      # contains the reports and apk
      - name: Save test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-api-level-$API_CURRENT
          path: ./Branch-SDK/build/
  instrumented-test-api-level-current:
    name: instrumented-test-api-level-$API_CURRENT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # repo's gradle is configured to run on java 17
      - name: Setup java 17 for gradle
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      # Boots an emulator on KVM-accelerated Ubuntu and runs instrumented tests
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: |
            ./gradlew :Branch-SDK:connectedDebugAndroidTest -Dorg.gradle.jvmargs="-Xmx8192M -Dkotlin.daemon.jvm.options\\=\"-Xmx8192M\"" --info
      # contains the reports and apk
      - name: Save test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-api-level-$API_CURRENT
          path: ./Branch-SDK/build/
